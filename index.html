<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Geometry Lab - Fun with Shapes!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            background-color: #fff9f0;
            color: #1e293b;
            overflow: hidden;
        }
        .bubbly {
            background: white;
            border: 4px solid #f0f4f8;
            border-radius: 2rem;
            box-shadow: 0 10px 0 #e2e8f0, 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bubbly-blue { border-color: #bae6fd; box-shadow: 0 8px 0 #7dd3fc; }
        .bubbly-pink { border-color: #fbcfe8; box-shadow: 0 8px 0 #f472b6; }
        .bubbly-yellow { border-color: #fef08a; box-shadow: 0 8px 0 #facc15; }
        .bubbly-green { border-color: #bbf7d0; box-shadow: 0 8px 0 #4ade80; }
        
        .bubbly.hidden-panel {
            transform: translateY(150%) rotate(5deg);
            opacity: 0;
            pointer-events: none;
        }
        .bubbly.hidden-panel-right {
            transform: translateX(150%) rotate(-5deg);
            opacity: 0;
            pointer-events: none;
        }
        input[type=range] {
            accent-color: #fb923c;
            height: 12px;
            border-radius: 10px;
        }
        .shape-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent;
        }
        .shape-btn:hover {
            transform: scale(1.1);
        }
        .shape-btn.active {
            background-color: #fb923c;
            color: white;
            border-color: #f97316;
            transform: scale(1.15);
            box-shadow: 0 5px 0 #ea580c;
        }
        .ui-panel {
            pointer-events: auto;
        }
        .lang-btn {
            transition: all 0.2s;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .lang-btn.active {
            background: #fb923c;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body class="h-screen w-screen relative flex">
    
    <!-- 1. 3D Viewport (Full Background) -->
    <div id="canvas-container" class="absolute inset-0 z-0"></div>

    <!-- 2. Main UI Layer -->
    <div class="relative z-10 w-full h-full pointer-events-none flex flex-col p-6">
        
        <!-- Header -->
        <header class="flex justify-between items-start">
            <div class="bubbly bubbly-blue p-4 ui-panel flex items-center gap-6">
                <div class="flex items-center gap-4">
                    <div class="bg-orange-400 p-3 rounded-2xl shadow-lg transform -rotate-3">
                        <i data-lucide="sparkles" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 id="ui-title" class="text-xl font-bold tracking-tight text-slate-800">3D Geometry Lab</h1>
                        <p id="ui-subtitle" class="text-xs text-orange-500 font-bold uppercase tracking-wider">Sustainable Design for Kids</p>
                    </div>
                </div>
                
                <div class="h-10 w-1 bg-slate-100 rounded-full"></div>
                
                <!-- Language Switcher -->
                <div class="flex gap-1 bg-slate-50 p-1 rounded-2xl">
                    <button onclick="setLanguage('en')" id="lang-en" class="lang-btn active">EN</button>
                    <button onclick="setLanguage('zh')" id="lang-zh" class="lang-btn">中文</button>
                    <button onclick="setLanguage('es')" id="lang-es" class="lang-btn">ES</button>
                    <button onclick="setLanguage('ja')" id="lang-ja" class="lang-btn">日本語</button>
                </div>

                <div class="h-10 w-1 bg-slate-100 rounded-full"></div>

                <button onclick="toggleUI()" class="p-3 bg-slate-100 hover:bg-slate-200 rounded-2xl transition-all text-slate-500 hover:scale-110" title="Hide/Show UI">
                    <i data-lucide="layout" id="toggle-icon" class="w-6 h-6"></i>
                </button>
            </div>
        </header>

        <!-- Right Side: Shape Selector (Floating) -->
        <div class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-4">
            <div id="shape-selector" class="bubbly bubbly-yellow p-3 flex flex-col gap-4 ui-panel">
                <button onclick="setShape('box')" id="btn-box" class="shape-btn active w-14 h-14 rounded-2xl flex items-center justify-center bg-blue-50 text-blue-500" title="Box">
                    <i data-lucide="package" class="w-7 h-7"></i>
                </button>
                <button onclick="setShape('cube')" id="btn-cube" class="shape-btn w-14 h-14 rounded-2xl flex items-center justify-center bg-pink-50 text-pink-500" title="Cube">
                    <i data-lucide="square" class="w-7 h-7"></i>
                </button>
                <button onclick="setShape('cylinder')" id="btn-cylinder" class="shape-btn w-14 h-14 rounded-2xl flex items-center justify-center bg-green-50 text-green-500" title="Cylinder">
                    <i data-lucide="cylinder" class="w-7 h-7"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 flex justify-between items-end mt-auto mb-4">
            <!-- Bottom Left: Shape Info Card -->
            <div id="info-panel" class="bubbly bubbly-pink p-6 w-72 ui-panel">
                <div class="mb-4">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-3 h-3 rounded-full bg-pink-400 animate-bounce"></div>
                        <h2 id="shape-name" class="text-2xl font-bold text-slate-800">Box</h2>
                    </div>
                    <p id="shape-desc" class="text-xs text-slate-500 leading-relaxed font-medium">The most common shape for packaging. Great for stacking!</p>
                </div>
                
                <div class="space-y-3 bg-pink-50/50 p-4 rounded-2xl">
                    <div class="flex justify-between items-center text-[10px] uppercase tracking-widest font-black text-pink-400 border-b border-pink-100 pb-2">
                        <span id="ui-properties">Properties</span>
                        <span id="ui-value">Value</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span id="ui-faces" class="text-xs font-bold text-slate-600">Faces</span>
                        <span id="faces-count" class="text-lg font-black text-pink-500">6</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span id="ui-edges" class="text-xs font-bold text-slate-600">Edges</span>
                        <span id="edges-count" class="text-lg font-black text-pink-500">12</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span id="ui-vertices" class="text-xs font-bold text-slate-600">Vertices</span>
                        <span id="vertices-count" class="text-lg font-black text-pink-500">8</span>
                    </div>
                </div>
            </div>

            <!-- Bottom Right: Dimension Sliders -->
            <div id="control-panel" class="bubbly bubbly-green p-6 w-80 ui-panel">
                <h3 id="ui-dimensions" class="text-xs font-black text-green-500 uppercase tracking-widest mb-6">Change the Size!</h3>
                <div class="space-y-6">
                    <div id="control-width" class="control-group">
                        <div class="flex justify-between text-xs font-bold text-slate-700 mb-3">
                            <span id="label-width">Width</span>
                            <span id="val-width" class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs">2.0</span>
                        </div>
                        <input type="range" min="0.5" max="5" step="0.1" value="2" class="w-full appearance-none cursor-pointer" oninput="updateDimensions('width', this.value)">
                    </div>
                    <div id="control-height" class="control-group">
                        <div class="flex justify-between text-xs font-bold text-slate-700 mb-3">
                            <span id="label-height">Height</span>
                            <span id="val-height" class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs">2.0</span>
                        </div>
                        <input type="range" min="0.5" max="5" step="0.1" value="2" class="w-full appearance-none cursor-pointer" oninput="updateDimensions('height', this.value)">
                    </div>
                    <div id="control-depth" class="control-group">
                        <div class="flex justify-between text-xs font-bold text-slate-700 mb-3">
                            <span id="label-depth">Depth</span>
                            <span id="val-depth" class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs">2.0</span>
                        </div>
                        <input type="range" min="0.5" max="5" step="0.1" value="2" class="w-full appearance-none cursor-pointer" oninput="updateDimensions('depth', this.value)">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js Implementation -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let currentMesh, wireframe;
        let shapeType = 'box';
        let dimensions = { width: 2, height: 2, depth: 2, radius: 1 };
        let uiVisible = true;
        let currentLang = 'en';
        const container = document.getElementById('canvas-container');

        const translations = {
            en: {
                title: "3D Geometry Lab",
                subtitle: "Sustainable Design for Kids",
                box: "Box",
                cube: "Cube",
                cylinder: "Cylinder",
                boxDesc: "The most common shape for packaging. Great for stacking!",
                cubeDesc: "A special box where all sides are equal. Very strong!",
                cylinderDesc: "Perfect for liquids or rolls. Strong and round!",
                properties: "Properties",
                value: "Value",
                faces: "Faces",
                edges: "Edges",
                vertices: "Vertices",
                dimensions: "Change the Size!",
                width: "Width",
                height: "Height",
                depth: "Depth",
                radius: "Radius",
                size: "Size"
            },
            zh: {
                title: "3D 几何实验室",
                subtitle: "可持续包装设计 - 少儿版",
                box: "长方体",
                cube: "正方体",
                cylinder: "圆柱体",
                boxDesc: "包装中最常见的形状，非常适合堆叠和节省空间。",
                cubeDesc: "所有边都相等的特殊长方体，非常坚固！",
                cylinderDesc: "适合装液体或卷状物，又强又圆！",
                properties: "形状属性",
                value: "数值",
                faces: "面数",
                edges: "棱数",
                vertices: "顶点数",
                dimensions: "调整大小",
                width: "宽度",
                height: "高度",
                depth: "深度",
                radius: "半径",
                size: "边长"
            },
            es: {
                title: "Laboratorio 3D",
                subtitle: "Diseño Sostenible para Niños",
                box: "Prisma",
                cube: "Cubo",
                cylinder: "Cilindro",
                boxDesc: "La forma más común para empaques. ¡Ideal para apilar!",
                cubeDesc: "Una caja especial con lados iguales. ¡Muy resistente!",
                cylinderDesc: "Perfecto para líquidos o rollos. ¡Fuerte y redondo!",
                properties: "Propiedades",
                value: "Valor",
                faces: "Caras",
                edges: "Bordes",
                vertices: "Vértices",
                dimensions: "¡Cambia el Tamaño!",
                width: "Ancho",
                height: "Altura",
                depth: "Fondo",
                radius: "Radio",
                size: "Tamaño"
            },
            ja: {
                title: "3D 幾何学ラボ",
                subtitle: "キッズ向けサステナブルデザイン",
                box: "長方体",
                cube: "立方体",
                cylinder: "円柱",
                boxDesc: "パッケージで最も一般的な形。積み重ねるのに最適！",
                cubeDesc: "すべての辺が等しい特別な箱。とても丈夫です！",
                cylinderDesc: "液体やロール状のものに最適。強くて丸い！",
                properties: "プロパティ",
                value: "あたい",
                faces: "めんの数",
                edges: "へんの数",
                vertices: "ちょうてんの数",
                dimensions: "サイズを変えてみよう！",
                width: "はば",
                height: "たかさ",
                depth: "おくゆき",
                radius: "はんけい",
                size: "いっぺん"
            }
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfff9f0); // Soft warm background
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting for a bright, cheerful look
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(5, 10, 7);
            scene.add(mainLight);

            const fillLight = new THREE.PointLight(0xffba08, 15); // Warm accent light
            fillLight.position.set(-5, 2, -5);
            scene.add(fillLight);

            // Colorful Grid
            const gridHelper = new THREE.GridHelper(20, 40, 0xe2e8f0, 0xf1f5f9);
            gridHelper.position.y = -2;
            scene.add(gridHelper);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 0.5, 0);
            
            controls.minDistance = 2;
            controls.maxDistance = 10;

            createShape();
            animate();
            
            window.addEventListener('resize', onWindowResize);
            lucide.createIcons();
            setLanguage('en'); // Default to English
        }

        function createShape() {
            if (currentMesh) {
                scene.remove(currentMesh);
                scene.remove(wireframe);
            }

            let geometry;
            if (shapeType === 'box' || shapeType === 'cube') {
                geometry = new THREE.BoxGeometry(dimensions.width, dimensions.height, dimensions.depth);
            } else if (shapeType === 'cylinder') {
                geometry = new THREE.CylinderGeometry(dimensions.radius, dimensions.radius, dimensions.height, 48);
            }

            // Fun, colorful material
            const material = new THREE.MeshPhysicalMaterial({
                color: shapeType === 'box' ? 0x60a5fa : (shapeType === 'cube' ? 0xf472b6 : 0x4ade80),
                metalness: 0,
                roughness: 0.1,
                transmission: 0.2,
                transparent: true,
                opacity: 0.9,
                clearcoat: 1.0
            });

            currentMesh = new THREE.Mesh(geometry, material);
            
            const geoWireframe = new THREE.EdgesGeometry(geometry);
            const matWireframe = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
            wireframe = new THREE.LineSegments(geoWireframe, matWireframe);

            scene.add(currentMesh);
            scene.add(wireframe);

            updateUI();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (currentMesh) {
                currentMesh.rotation.y += 0.005; // Gentle rotation for kids to see all sides
                wireframe.rotation.y += 0.005;
            }
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Global functions for UI
        window.setLanguage = (lang) => {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`lang-${lang}`).classList.add('active');
            
            const t = translations[lang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-subtitle').innerText = t.subtitle;
            document.getElementById('ui-properties').innerText = t.properties;
            document.getElementById('ui-value').innerText = t.value;
            document.getElementById('ui-faces').innerText = t.faces;
            document.getElementById('ui-edges').innerText = t.edges;
            document.getElementById('ui-vertices').innerText = t.vertices;
            document.getElementById('ui-dimensions').innerText = t.dimensions;
            document.getElementById('label-height').innerText = t.height;
            document.getElementById('label-depth').innerText = t.depth;
            
            updateUI();
        };

        window.toggleUI = () => {
            uiVisible = !uiVisible;
            const infoPanel = document.getElementById('info-panel');
            const controlPanel = document.getElementById('control-panel');
            const shapeSelector = document.getElementById('shape-selector');
            const toggleIcon = document.getElementById('toggle-icon');

            if (uiVisible) {
                infoPanel.classList.remove('hidden-panel');
                controlPanel.classList.remove('hidden-panel');
                shapeSelector.classList.remove('hidden-panel-right');
                toggleIcon.setAttribute('data-lucide', 'layout');
            } else {
                infoPanel.classList.add('hidden-panel');
                controlPanel.classList.add('hidden-panel');
                shapeSelector.classList.add('hidden-panel-right');
                toggleIcon.setAttribute('data-lucide', 'layout-dashboard');
            }
            lucide.createIcons();
        };

        window.setShape = (type) => {
            shapeType = type;
            document.querySelectorAll('.shape-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');

            createShape();
        };

        window.updateDimensions = (prop, val) => {
            const numVal = parseFloat(val);
            document.getElementById(`val-${prop}`).innerText = numVal.toFixed(1);
            
            if (shapeType === 'cube') {
                dimensions.width = numVal;
                dimensions.height = numVal;
                dimensions.depth = numVal;
            } else if (shapeType === 'cylinder' && prop === 'width') {
                dimensions.radius = numVal;
            } else {
                dimensions[prop] = numVal;
            }
            
            createShape();
        };

        function updateUI() {
            const t = translations[currentLang];
            const labelWidth = document.getElementById('label-width');
            
            if (shapeType === 'box') {
                document.getElementById('shape-name').innerText = t.box;
                document.getElementById('shape-desc').innerText = t.boxDesc;
                document.getElementById('faces-count').innerText = 6;
                document.getElementById('edges-count').innerText = 12;
                document.getElementById('vertices-count').innerText = 8;
                document.getElementById('control-height').classList.remove('hidden');
                document.getElementById('control-depth').classList.remove('hidden');
                labelWidth.innerText = t.width;
            } else if (shapeType === 'cube') {
                document.getElementById('shape-name').innerText = t.cube;
                document.getElementById('shape-desc').innerText = t.cubeDesc;
                document.getElementById('faces-count').innerText = 6;
                document.getElementById('edges-count').innerText = 12;
                document.getElementById('vertices-count').innerText = 8;
                document.getElementById('control-height').classList.add('hidden');
                document.getElementById('control-depth').classList.add('hidden');
                labelWidth.innerText = t.size;
            } else if (shapeType === 'cylinder') {
                document.getElementById('shape-name').innerText = t.cylinder;
                document.getElementById('shape-desc').innerText = t.cylinderDesc;
                document.getElementById('faces-count').innerText = 3;
                document.getElementById('edges-count').innerText = 2;
                document.getElementById('vertices-count').innerText = 0;
                document.getElementById('control-height').classList.remove('hidden');
                document.getElementById('control-depth').classList.add('hidden');
                labelWidth.innerText = t.radius;
            }
        }

        init();
    </script>
</body>
  </html>
